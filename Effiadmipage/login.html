<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Iniciar Sesión - EFFIADMI</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <header>
    <a href="index.html" class="logo">
        <img src="logo.svg" alt="EFFIADMI" class="logo-img">
      </a>


  <main>
    <section class="auth">
      <div class="auth-card container">
        <h2>Iniciar sesión</h2>
        <p class="small">Ingresa con tu correo y contraseña para acceder a tu panel.</p>
        <form id="loginForm">
          <label for="email">Correo electrónico</label>
          <input id="email" name="email" type="email" placeholder="tu@ejemplo.com" required>

          <label for="password">Contraseña</label>
          <input id="password" name="password" type="password" placeholder="Contraseña" minlength="8" required>

          <button type="submit" class="btn btn-primary full" style="margin-top:12px;">Entrar</button>
          <p style="margin-top:12px; color:var(--gris)">¿No tienes cuenta? <a href="registro.html">Regístrate aquí</a></p>
        </form>
      </div>
    </section>
  </main>

  <script src="js/main.js"></script>
</body>
</html>
