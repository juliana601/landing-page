<?xml version="1.0" encoding="UTF-8"?>
<svg width="400" height="110" viewBox="0 0 400 110" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Logo EFFIADMI">
  <defs>
    <linearGradient id="g1" x1="0" x2="1">
      <stop offset="0" stop-color="#6C3AF2"/>
      <stop offset="1" stop-color="#8A5CFF"/>
    </linearGradient>

    <filter id="f1" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="8" stdDeviation="18" flood-color="#6C3AF2" flood-opacity="0.12"/>
    </filter>

    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <style>
      /* Tipografía fallback: usa Poppins/Segoe UI si están disponibles */
      .brand { font-family: "Poppins", "Segoe UI", system-ui, -apple-system, "Helvetica Neue", Arial; font-weight: 800; letter-spacing: 0.6px; }
    </style>
  </defs>

  <!-- Icon background rounded square -->
  <g transform="translate(8,8)">
    <rect x="0" y="0" width="94" height="94" rx="18" fill="url(#g1)" filter="url(#f1)"/>
    <!-- stylized "E" made of bars with slight cut for futurista -->
    <g transform="translate(14,18)" fill="#fff">
      <rect x="0" y="0" width="52" height="10" rx="3"/>
      <rect x="0" y="28" width="40" height="10" rx="3"/>
      <rect x="0" y="56" width="52" height="10" rx="3"/>
      <!-- diagonal cut to give futuristic look -->
      <polygon points="52,0 66,0 46,34 66,68 52,68 36,34" fill-opacity="0.06" fill="#ffffff"/>
    </g>
  </g>

  <!-- Brand text -->
  <g transform="translate(120,62)">
    <text x="0" y="0" class="brand" font-size="34" fill="#231B4A">EFFIADMI</text>
    
    <!-- subtle underline gradient bar -->
    <rect x="0" y="12" width="300" height="6" rx="4" fill="url(#g1)" opacity="0.10" filter="url(#glow)"/>
  </g>
</svg>
