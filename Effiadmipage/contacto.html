<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Contáctenos - EFFIADMI</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header>
   <a href="index.html" class="logo">
        <img src="logo.svg" alt="EFFIADMI" class="logo-img">
      </a>

  </header>

  <main class="container">
    <section class="contact" style="padding-top:18px;">
      <h1>Contáctenos</h1>
      <p class="lead-small">Solicita una demo o escribe a nuestro equipo de soporte. Responderemos a la brevedad.</p>

      <div class="contact-grid" style="margin-top:18px;">
        <form id="contactForm" class="contact-form" novalidate>
          <label for="nombreContacto">Nombre completo</label>
          <input id="nombreContacto" name="nombreContacto" placeholder="Tu nombre" type="text">

          <label for="emailContacto">Correo electrónico</label>
          <input id="emailContacto" name="emailContacto" placeholder="tu@ejemplo.com" type="email">

          <label for="mensajeContacto">Mensaje</label>
          <textarea id="mensajeContacto" name="mensajeContacto" rows="5" placeholder="Cuéntanos en qué podemos ayudarte"></textarea>

          <button type="submit" class="btn btn-primary full" style="margin-top:12px;">Enviar mensaje</button>
        </form>

        <div class="contact-info">
          <h3>Datos de contacto</h3>
          <p><strong>Correo:</strong> soporte@effiadmi.com</p>
          <p><strong>Teléfono:</strong> +57 300 000 0000</p>
          <p><strong>Horario:</strong> Lun - Vie 9:00 - 18:00</p>
        </div>
      </div>
    </section>
  </main>

  <script src="js/main.js"></script>
</body>
</html>
